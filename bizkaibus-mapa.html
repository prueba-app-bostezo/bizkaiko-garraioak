<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizkaibus en directo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --naranja:#E84E1B;--naranja-osc:#C23E12;--tinta:#1C1B1A;
    --hueso:#F6F2EA;--gris:#6B6660;--linea:#DCD5C8;
    --verde-ok:#2E7D4F;--rojo-err:#B3261E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:'Helvetica Neue',Arial,sans-serif;background:var(--hueso);color:var(--tinta);}
  #app{display:flex;flex-direction:column;height:100%;}
  header{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--tinta);color:var(--hueso);border-bottom:4px solid var(--naranja);flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:8px;margin-right:auto;}
  .brand .mark{font-weight:800;font-size:20px;letter-spacing:.5px;color:var(--naranja);}
  .brand .sub{font-size:12px;color:#C9C4BC;font-weight:400;}
  .status{font-size:12px;display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;background:#2A2826;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--gris);transition:background .2s;}
  .status.ok .dot{background:var(--verde-ok);animation:pulse 2s infinite;}
  .status.err .dot{background:var(--rojo-err);}
  .status.loading .dot{background:#E8B23D;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,125,79,.5);}70%{box-shadow:0 0 0 6px rgba(46,125,79,0);}100%{box-shadow:0 0 0 0 rgba(46,125,79,0);}}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .controls input[type="text"]{padding:7px 10px;border-radius:6px;border:1px solid #3a3835;background:#2A2826;color:var(--hueso);font-size:13px;width:120px;}
  .controls input[type="text"]::placeholder{color:#8a857d;}
  .controls select{padding:7px 8px;border-radius:6px;border:1px solid #3a3835;background:#2A2826;color:var(--hueso);font-size:13px;}
  .btn-refrescar{border:1px solid var(--naranja);background:transparent;color:var(--naranja);padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:background .15s,color .15s;}
  .btn-refrescar:hover{background:var(--naranja);color:var(--tinta);}
  main{position:relative;flex:1;min-height:0;}
  #map{position:absolute;inset:0;}
  .leyenda{position:absolute;bottom:16px;left:16px;z-index:500;background:rgba(28,27,26,0.92);color:var(--hueso);padding:10px 14px;border-radius:8px;font-size:12px;display:flex;flex-direction:column;gap:4px;box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .leyenda b{color:var(--naranja);font-size:13px;}
  .aviso{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:600;max-width:560px;width:calc(100% - 32px);background:#FFF7EC;border:1px solid var(--naranja);border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.5;box-shadow:0 8px 22px rgba(0,0,0,.18);display:none;}
  .aviso.show{display:block;}
  .aviso h3{margin:0 0 6px;font-size:14px;color:var(--naranja-osc);}
  .leaflet-popup-content-wrapper{border-radius:10px;}
  .popup-linea{display:inline-block;background:var(--naranja);color:white;font-weight:800;font-size:14px;padding:2px 8px;border-radius:5px;margin-bottom:6px;}
  .popup-dest{font-weight:600;font-size:13px;margin:0 0 4px;}
  .popup-meta{font-size:12px;color:var(--gris);margin:2px 0;}
  .popup-retraso-tarde{color:var(--rojo-err);font-weight:600;}
  .popup-retraso-pronto{color:var(--verde-ok);font-weight:600;}

  .btn-buscador{
    position:absolute;top:16px;left:16px;z-index:500;
    background:var(--tinta);color:var(--hueso);
    border:1px solid var(--naranja);
    padding:9px 16px;border-radius:8px;
    font-size:13px;font-weight:700;
    cursor:pointer;font-family:inherit;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  .btn-buscador:hover{background:var(--naranja);color:var(--tinta);}

  .panel-buscador{
    position:absolute;top:60px;left:16px;z-index:500;
    width:300px;max-width:calc(100vw - 32px);
    background:rgba(28,27,26,0.97);color:var(--hueso);
    border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.35);
    padding:16px;
    display:none;
    max-height:calc(100% - 80px);
    overflow-y:auto;
  }
  .panel-buscador.show{display:block;}
  .panel-buscador h3{margin:0 0 12px;font-size:15px;color:var(--naranja);}
  .campo-buscador{margin-bottom:12px;}
  .campo-buscador label{
    display:block;font-size:11px;color:#8a857d;
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;
  }
  .campo-buscador select, .campo-buscador input{
    width:100%;padding:8px 10px;border-radius:6px;
    border:1px solid #3a3835;background:#2A2826;color:var(--hueso);
    font-size:13px;font-family:inherit;
  }
  .btn-buscar-trayecto{
    width:100%;background:var(--naranja);color:var(--tinta);
    border:none;padding:10px;border-radius:8px;
    font-weight:700;font-size:13px;cursor:pointer;margin-top:4px;
  }
  .btn-buscar-trayecto:hover{background:var(--naranja-osc);}
  .resultados-trayecto{margin-top:16px;border-top:1px solid #3a3835;padding-top:12px;}
  .resultado-linea{
    background:#2A2826;border-radius:8px;padding:10px 12px;margin-bottom:8px;
  }
  .resultado-linea .cab{
    display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;
  }
  .resultado-linea .cab b{color:var(--naranja);font-size:14px;}
  .resultado-linea .salidas{font-size:12px;color:#C9C4BC;line-height:1.6;}
  .resultados-vacio{font-size:12px;color:#8a857d;text-align:center;padding:10px 0;}

  .panel-itinerario{
    position:absolute;top:0;right:0;bottom:0;
    width:340px;max-width:90vw;
    background:rgba(28,27,26,0.97);
    color:var(--hueso);
    box-shadow:-6px 0 20px rgba(0,0,0,.3);
    z-index:550;
    display:flex;flex-direction:column;
    transform:translateX(100%);
    transition:transform .2s ease;
  }
  .panel-itinerario.show{transform:translateX(0);}
  .panel-itinerario-cabecera{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;border-bottom:1px solid #3a3835;flex-shrink:0;
  }
  .panel-itinerario-linea{
    font-weight:800;font-size:16px;color:var(--naranja);
  }
  #btnCerrarItinerario{
    background:transparent;border:none;color:var(--hueso);
    font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;
    line-height:1;
  }
  #btnCerrarItinerario:hover{background:#2A2826;}
  .panel-itinerario-tabs{
    display:flex;gap:6px;padding:10px 16px 0;flex-shrink:0;
  }
  .panel-itinerario-tabs button{
    flex:1;background:#2A2826;border:1px solid #3a3835;color:var(--hueso);
    font-size:12px;font-weight:600;padding:7px 8px;border-radius:6px;
    cursor:pointer;
  }
  .panel-itinerario-tabs button.activa{
    background:var(--naranja);color:var(--tinta);border-color:var(--naranja);
  }
  .panel-itinerario-lista{
    flex:1;overflow-y:auto;padding:14px 16px 20px;
  }
  .parada-item{
    display:flex;align-items:flex-start;gap:10px;
    padding:8px 0;
    border-left:2px solid #3a3835;
    margin-left:5px;padding-left:14px;
    position:relative;
  }
  .parada-item::before{
    content:"";position:absolute;left:-6px;top:13px;
    width:9px;height:9px;border-radius:50%;
    background:var(--naranja);border:2px solid #1C1B1A;
  }
  .parada-item:first-child::before, .parada-item:last-child::before{
    width:11px;height:11px;left:-7px;
  }
  .parada-item .num{
    font-size:11px;color:#8a857d;min-width:18px;flex-shrink:0;padding-top:1px;
  }
  .parada-item .nombre{font-size:13px;line-height:1.4;}
  .panel-itinerario-vacio{
    color:#8a857d;font-size:13px;padding:20px 0;text-align:center;
  }

  @media (max-width: 640px){
    .panel-itinerario{width:100%;max-width:100%;}
  }

  footer{padding:7px 16px;font-size:11px;color:var(--gris);background:var(--hueso);border-top:1px solid var(--linea);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="mark">BIZKAIBUS</span>
      <span class="sub">posición de autobuses en directo</span>
    </div>
    <div class="controls">
      <input type="text" id="filtroLinea" placeholder="Filtrar línea, ej. A3247">
      <select id="intervalo">
        <option value="10000">Cada 10 s</option>
        <option value="20000" selected>Cada 20 s</option>
        <option value="30000">Cada 30 s</option>
        <option value="60000">Cada 60 s</option>
      </select>
      <button class="btn-refrescar" id="btnRefrescar">Actualizar ahora</button>
    </div>
    <div class="status loading" id="status">
      <span class="dot"></span>
      <span id="statusTexto">Conectando…</span>
    </div>
  </header>
  <main>
    <div id="map"></div>

    <button type="button" class="btn-buscador" id="btnBuscador">🔍 Buscar trayecto</button>
    <div class="panel-buscador" id="panelBuscador">
      <h3>¿Qué autobús coger?</h3>
      <div class="campo-buscador">
        <label for="selectOrigen">Origen</label>
        <select id="selectOrigen"><option value="">Selecciona parada…</option></select>
      </div>
      <div class="campo-buscador">
        <label for="selectDestino">Destino</label>
        <select id="selectDestino"><option value="">Selecciona parada…</option></select>
      </div>
      <div class="campo-buscador">
        <label for="inputFecha">Fecha</label>
        <input type="date" id="inputFecha">
      </div>
      <button type="button" class="btn-buscar-trayecto" id="btnBuscarTrayecto">Buscar</button>
      <div class="resultados-trayecto" id="resultadosTrayecto"></div>
    </div>
    <div class="leyenda">
      <b id="contadorBuses">0 autobuses</b>
      <span id="ultimaActualizacion">esperando primera lectura…</span>
    </div>
    <div class="aviso" id="aviso">
      <h3>No se ha podido leer el feed en directo</h3>
      <div id="avisoTexto"></div>
    </div>
    <div class="panel-itinerario" id="panelItinerario">
      <div class="panel-itinerario-cabecera">
        <span class="panel-itinerario-linea" id="panelItinerarioLinea"></span>
        <button type="button" id="btnCerrarItinerario" aria-label="Cerrar itinerario">✕</button>
      </div>
      <div class="panel-itinerario-tabs" id="panelItinerarioTabs"></div>
      <div class="panel-itinerario-lista" id="panelItinerarioLista"></div>
    </div>
  </main>
  <footer>
    <span id="fuenteTexto">Fuente: SIRI Vehicle Monitoring — Consorcio de Transportes de Bizkaia</span>
    <span>Mapa © OpenStreetMap</span>
  </footer>
</div>

<script>
(function(){
  var URL_FEED  = "https://bizkaibus.cuentasmurf7.workers.dev";
  var URL_RUTAS = "feeds/rutas_simple.json";
  var URL_ITINERARIOS = "feeds/itinerarios_lineas.json";
  var URL_LISTA_PARADAS = "feeds/lista_paradas.json";
  var URL_INDICE_PARADAS = "feeds/indice_paradas.json";
  // Horarios simplificados por patrón semanal (no por fecha exacta, ver
  // notas en cargarDatosBuscadorTrayecto): un único bloque por línea+
  // dirección+categoría de día (laborable / sábado / domingo). No cubre
  // todavía cambios de horario de verano ni festivos especiales — eso se
  // añadirá en una iteración posterior.
  var URL_HORARIOS_SEMANALES = "feeds/horarios_semanales.json";
  var CENTRO    = [43.2630, -2.9350];

  var map, capaBuses;
  var intervaloId  = null;
  var rutasCache   = null;
  var rutaActual   = null;
  var cacheVehiculos = [];
  var itinerariosCache = null;
  var direccionMostrada = '0'; // '0' o '1', qué pestaña de ida/vuelta está activa
  var listaParadasCache = null;     // [[stop_id, nombre], ...]
  var indiceParadasCache = null;    // stop_id -> [{linea, dir, idx}, ...]
  var horariosSemanalesCache = null; // linea -> dir -> {laborable:[[...]], sabado:[[...]], domingo:[[...]]}

  // ------------------------------------------------------------------
  function init(){
    map = L.map('map', {zoomControl:true}).setView(CENTRO, 11);
    // Se quita el logo/marca de Leaflet del control de atribución del mapa
    // (atributo "prefix" del attributionControl), manteniendo la atribución
    // a OpenStreetMap, que sí es obligatoria por sus términos de uso.
    map.attributionControl.setPrefix(false);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      maxZoom:19,
      attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
    capaBuses = L.layerGroup().addTo(map);

    map.on('click', function(e){
      // Borrar ruta al clicar en el mapa fuera de un marcador
      if(!e.originalEvent._marcadorClick) borrarRuta();
    });

    document.getElementById('btnRefrescar').addEventListener('click', cargar);
    document.getElementById('filtroLinea').addEventListener('input', function(){
      pintarDesdeCache();
      actualizarPanelItinerario();
    });
    document.getElementById('intervalo').addEventListener('change', reiniciarTemporizador);
    document.getElementById('btnCerrarItinerario').addEventListener('click', ocultarPanelItinerario);

    document.getElementById('btnBuscador').addEventListener('click', toggleBuscador);
    document.getElementById('btnBuscarTrayecto').addEventListener('click', buscarTrayecto);

    cargarRutas();
    cargarItinerarios();
    cargarDatosBuscadorTrayecto();
    cargar();
    reiniciarTemporizador();
  }

  // ------------------------------------------------------------------
  // BUSCADOR DE TRAYECTO (origen + destino + fecha -> qué líneas coger)
  //
  // MODELO SIMPLIFICADO (primera versión, a mejorar más adelante):
  // en vez de mirar el calendario exacto día a día, los horarios se agrupan
  // en tres patrones según el día de la semana de la fecha elegida:
  //   - "laborable": lunes a viernes
  //   - "sabado"
  //   - "domingo"
  // Esto NO tiene en cuenta todavía festivos, vísperas de festivo, ni el
  // cambio de horario de verano/invierno que sí existe en los datos
  // oficiales — esos casos especiales se ignoran por ahora a propósito,
  // mostrando siempre el horario típico de ese día de la semana.
  // ------------------------------------------------------------------
  function toggleBuscador(){
    document.getElementById('panelBuscador').classList.toggle('show');
  }

  function cargarDatosBuscadorTrayecto(){
    var inputFecha = document.getElementById('inputFecha');
    var hoy = new Date();
    inputFecha.value = hoy.toISOString().slice(0,10);

    Promise.all([
      fetch(URL_LISTA_PARADAS).then(function(r){ return r.json(); }),
      fetch(URL_INDICE_PARADAS).then(function(r){ return r.json(); }),
      fetch(URL_HORARIOS_SEMANALES).then(function(r){ return r.json(); })
    ]).then(function(resultados){
      listaParadasCache = resultados[0];
      indiceParadasCache = resultados[1];
      horariosSemanalesCache = resultados[2];
      poblarDesplegablesParadas();
    }).catch(function(err){
      console.error('No se pudieron cargar los datos del buscador de trayecto:', err);
    });
  }

  function poblarDesplegablesParadas(){
    var selectOrigen = document.getElementById('selectOrigen');
    var selectDestino = document.getElementById('selectDestino');
    var fragmentoOrigen = document.createDocumentFragment();
    var fragmentoDestino = document.createDocumentFragment();

    listaParadasCache.forEach(function(par){
      var stopId = par[0], nombre = par[1] || ('Parada ' + par[0]);
      var opt1 = document.createElement('option');
      opt1.value = stopId; opt1.textContent = nombre;
      fragmentoOrigen.appendChild(opt1);

      var opt2 = document.createElement('option');
      opt2.value = stopId; opt2.textContent = nombre;
      fragmentoDestino.appendChild(opt2);
    });

    selectOrigen.appendChild(fragmentoOrigen);
    selectDestino.appendChild(fragmentoDestino);
  }

  // A partir de un valor "YYYY-MM-DD" (input type=date), devuelve la
  // categoría de día: 'laborable', 'sabado' o 'domingo'.
  function categoriaDeFecha(valorInputFecha){
    // New Date('YYYY-MM-DD') se interpreta en UTC; para evitar que un
    // desfase horario cambie el día mostrado, construimos la fecha con
    // los componentes por separado (hora local 12:00 de margen seguro).
    var partes = valorInputFecha.split('-').map(Number);
    var fecha = new Date(partes[0], partes[1]-1, partes[2], 12, 0, 0);
    var diaSemana = fecha.getDay(); // 0=domingo, 1=lunes, ..., 6=sábado
    if(diaSemana === 0) return 'domingo';
    if(diaSemana === 6) return 'sabado';
    return 'laborable';
  }

  function buscarTrayecto(){
    var origenId = document.getElementById('selectOrigen').value;
    var destinoId = document.getElementById('selectDestino').value;
    var valorFecha = document.getElementById('inputFecha').value;
    var contenedorResultados = document.getElementById('resultadosTrayecto');

    if(!origenId || !destinoId){
      contenedorResultados.innerHTML = '<p class="resultados-vacio">Elige una parada de origen y otra de destino.</p>';
      return;
    }
    if(origenId === destinoId){
      contenedorResultados.innerHTML = '<p class="resultados-vacio">El origen y el destino no pueden ser la misma parada.</p>';
      return;
    }
    if(!valorFecha){
      contenedorResultados.innerHTML = '<p class="resultados-vacio">Elige una fecha.</p>';
      return;
    }

    var categoria = categoriaDeFecha(valorFecha);

    // 1. ¿Qué línea+dirección tienen tanto el origen como el destino, con el
    //    origen en una posición ANTERIOR al destino dentro del recorrido?
    var entradasOrigen = indiceParadasCache[origenId] || [];
    var entradasDestino = indiceParadasCache[destinoId] || [];

    var candidatas = []; // {linea, dir, idxOrigen, idxDestino}
    entradasOrigen.forEach(function(eo){
      entradasDestino.forEach(function(ed){
        if(eo.linea === ed.linea && eo.dir === ed.dir && eo.idx < ed.idx){
          candidatas.push({ linea: eo.linea, dir: eo.dir, idxOrigen: eo.idx, idxDestino: ed.idx });
        }
      });
    });

    if(!candidatas.length){
      contenedorResultados.innerHTML = '<p class="resultados-vacio">No se ha encontrado ninguna línea directa entre esas dos paradas.</p>';
      return;
    }

    // 2. Para cada línea+dirección candidata, leer sus salidas de la
    //    categoría de día correspondiente (ya están todas cargadas en
    //    memoria, sin necesidad de ninguna petición adicional).
    var resultadosPorLinea = candidatas.map(function(c){
      var bloqueLinea = horariosSemanalesCache[c.linea];
      var bloqueDir = bloqueLinea && bloqueLinea[c.dir];
      var salidas = (bloqueDir && bloqueDir[categoria]) || [];

      var salidasValidas = [];
      var vistos = {}; // dedup por "minOrigen-minDestino": distintos service_id
                        // del mismo bloque (laborable/sábado/domingo) pueden
                        // coincidir en horario en este tramo concreto aunque
                        // difieran en otras paradas del recorrido.
      salidas.forEach(function(horasPorIndice){
        var minOrigen = horasPorIndice[c.idxOrigen];
        var minDestino = horasPorIndice[c.idxDestino];
        if(minOrigen === undefined || minOrigen === -1) return;
        if(minDestino === undefined || minDestino === -1) return;
        var clave = minOrigen + '-' + minDestino;
        if(vistos[clave]) return;
        vistos[clave] = true;
        salidasValidas.push({ minOrigen: minOrigen, minDestino: minDestino });
      });

      salidasValidas.sort(function(a,b){ return a.minOrigen - b.minOrigen; });

      return { linea: c.linea, direccion: c.dir, salidas: salidasValidas };
    }).filter(function(r){ return r.salidas.length > 0; });

    pintarResultadosTrayecto(resultadosPorLinea, categoria);
  }

  function minutosAHora(min){
    // GTFS permite minutos >= 1440 (servicio que cruza medianoche); lo
    // mostramos tal cual, con la hora "extendida" (ej. 25:10) para que no
    // confunda con el día siguiente sin avisar.
    var h = Math.floor(min/60), m = min%60;
    return (h<10?'0':'')+h + ':' + (m<10?'0':'')+m;
  }

  function pintarResultadosTrayecto(resultados, categoria){
    var contenedor = document.getElementById('resultadosTrayecto');
    var etiquetaCategoria = {laborable:'laborable (L-V)', sabado:'sábado', domingo:'domingo'}[categoria] || categoria;

    if(!resultados.length){
      contenedor.innerHTML = '<p class="resultados-vacio">Ninguna línea directa tiene horario ' + esc(etiquetaCategoria) + ' entre esas paradas.</p>';
      return;
    }
    var aviso = '<p style="font-size:11px;color:#8a857d;margin:0 0 10px;">Horario típico de ' + esc(etiquetaCategoria) +
      '. Aún no se tienen en cuenta festivos ni el horario especial de verano.</p>';
    contenedor.innerHTML = aviso + resultados.map(function(r){
      var listaSalidas = r.salidas.slice(0, 8).map(function(s){
        return minutosAHora(s.minOrigen) + ' → ' + minutosAHora(s.minDestino);
      }).join(' &nbsp;·&nbsp; ');
      var extra = r.salidas.length > 8 ? ' …' : '';
      return '<div class="resultado-linea">' +
        '<div class="cab"><b>Línea ' + esc(r.linea) + '</b><span style="font-size:11px;color:#8a857d;">' +
          (r.direccion === '0' ? 'Ida' : 'Vuelta') + '</span></div>' +
        '<div class="salidas">' + listaSalidas + esc(extra) + '</div>' +
      '</div>';
    }).join('');
  }

  // ------------------------------------------------------------------
  // ITINERARIOS (paradas por línea, datos estáticos del GTFS oficial)
  // ------------------------------------------------------------------
  function cargarItinerarios(){
    fetch(URL_ITINERARIOS)
      .then(function(r){ return r.json(); })
      .then(function(d){ itinerariosCache = d; })
      .catch(function(){ itinerariosCache = {}; });
  }

  function actualizarPanelItinerario(){
    var filtro = document.getElementById('filtroLinea').value.trim().toUpperCase();
    if(!itinerariosCache || !filtro){
      ocultarPanelItinerario();
      return;
    }
    // Buscamos coincidencia exacta de línea, probando con y sin la "A" inicial,
    // igual que ya hacemos en otros sitios del código (las líneas urbanas/algunas
    // interurbanas no llevan ese prefijo).
    var datosLinea = itinerariosCache[filtro] || itinerariosCache['A'+filtro] || itinerariosCache[filtro.replace(/^A/,'')];
    if(!datosLinea){
      ocultarPanelItinerario();
      return;
    }
    mostrarPanelItinerario(filtro, datosLinea);
  }

  function mostrarPanelItinerario(linea, datosLinea){
    var direccionesDisponibles = Object.keys(datosLinea);
    if(direccionesDisponibles.indexOf(direccionMostrada) === -1){
      direccionMostrada = direccionesDisponibles[0];
    }

    document.getElementById('panelItinerarioLinea').textContent = 'Línea ' + linea;

    var tabs = document.getElementById('panelItinerarioTabs');
    tabs.innerHTML = '';
    direccionesDisponibles.forEach(function(dir){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = dir === '0' ? 'Ida' : 'Vuelta';
      btn.className = (dir === direccionMostrada) ? 'activa' : '';
      btn.addEventListener('click', function(){
        direccionMostrada = dir;
        mostrarPanelItinerario(linea, datosLinea);
      });
      tabs.appendChild(btn);
    });

    var paradas = datosLinea[direccionMostrada] || [];
    var lista = document.getElementById('panelItinerarioLista');
    if(!paradas.length){
      lista.innerHTML = '<p class="panel-itinerario-vacio">No hay itinerario disponible para este sentido.</p>';
    } else {
      lista.innerHTML = paradas.map(function(p, i){
        return '<div class="parada-item">' +
          '<span class="num">' + (i+1) + '</span>' +
          '<span class="nombre">' + esc(p.nombre || ('Parada ' + p.id)) + '</span>' +
        '</div>';
      }).join('');
    }

    document.getElementById('panelItinerario').classList.add('show');
  }

  function ocultarPanelItinerario(){
    document.getElementById('panelItinerario').classList.remove('show');
  }

  // ------------------------------------------------------------------
  // RUTAS
  // ------------------------------------------------------------------
  function cargarRutas(){
    fetch(URL_RUTAS)
      .then(function(r){ return r.json(); })
      .then(function(d){ rutasCache = d; })
      .catch(function(){ rutasCache = {}; });
  }

  function mostrarRuta(linea){
    borrarRuta();
    if(!rutasCache || !linea) return;
    var coords = rutasCache[linea] || rutasCache[linea.replace(/^A/,'')];
    if(!coords || coords.length < 2) return;
    // rutas_simple.json: [[lat,lon],...] — Leaflet usa [lat,lon], perfecto
    rutaActual = L.polyline(coords,{
      color:'#2E7D4F', weight:4, opacity:0.85, lineJoin:'round'
    }).addTo(map);
  }

  function borrarRuta(){
    if(rutaActual){ map.removeLayer(rutaActual); rutaActual = null; }
  }

  // ------------------------------------------------------------------
  // TEMPORIZADOR
  // ------------------------------------------------------------------
  function reiniciarTemporizador(){
    if(intervaloId) clearInterval(intervaloId);
    var ms = parseInt(document.getElementById('intervalo').value, 10);
    intervaloId = setInterval(cargar, ms);
  }

  // ------------------------------------------------------------------
  // ESTADO
  // ------------------------------------------------------------------
  function setStatus(estado, texto){
    document.getElementById('status').className = 'status ' + estado;
    document.getElementById('statusTexto').textContent = texto;
  }
  function mostrarAviso(html){
    document.getElementById('avisoTexto').innerHTML = html;
    document.getElementById('aviso').classList.add('show');
  }
  function ocultarAviso(){
    document.getElementById('aviso').classList.remove('show');
  }

  // ------------------------------------------------------------------
  // CARGA FEED
  // ------------------------------------------------------------------
  function cargar(){
    setStatus('loading','Actualizando…');
    fetch(URL_FEED + '?_=' + Date.now(), {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
      .then(function(txt){
        cacheVehiculos = parsearSiriVM(txt);
        pintarDesdeCache();
        ocultarAviso();
        setStatus('ok', cacheVehiculos.length + ' autobuses · ' + horaActual());
        document.getElementById('ultimaActualizacion').textContent = 'última lectura: ' + horaActual();
      })
      .catch(function(err){
        console.error(err);
        setStatus('err','Sin datos');
        mostrarAviso('No se ha podido leer el feed.<br><br>Detalle: ' + esc(err.message));
      });
  }

  function horaActual(){
    return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }

  // ------------------------------------------------------------------
  // PARSEO XML SIRI
  // ------------------------------------------------------------------
  function porLocalName(nodo, nombre){
    var todos = nodo.getElementsByTagName('*'), out = [];
    for(var i=0;i<todos.length;i++) if(todos[i].localName===nombre) out.push(todos[i]);
    return out;
  }
  function textoHijo(nodo, nombre){
    if(!nodo) return null;
    for(var i=0;i<nodo.children.length;i++)
      if(nodo.children[i].localName===nombre) return nodo.children[i].textContent.trim();
    return null;
  }
  function nodoHijo(nodo, nombre){
    if(!nodo) return null;
    for(var i=0;i<nodo.children.length;i++)
      if(nodo.children[i].localName===nombre) return nodo.children[i];
    return null;
  }
  function parsearDuracion(s){
    if(!s) return null;
    var neg = s[0]==='-';
    var m = s.replace('-','').match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:([\d.]+)S)?/);
    if(!m) return null;
    var t = (parseFloat(m[1]||0)*3600)+(parseFloat(m[2]||0)*60)+parseFloat(m[3]||0);
    return neg ? -t : t;
  }

  function parsearSiriVM(xmlTexto){
    var doc = new DOMParser().parseFromString(xmlTexto,'application/xml');
    if(doc.getElementsByTagName('parsererror').length)
      throw new Error('XML inválido');
    var actividades = porLocalName(doc,'VehicleActivity');
    var out = [];
    for(var i=0;i<actividades.length;i++){
      var act = actividades[i];
      var mvj = nodoHijo(act,'MonitoredVehicleJourney');
      if(!mvj) continue;
      var ub  = nodoHijo(mvj,'VehicleLocation');
      var lat = ub ? parseFloat(textoHijo(ub,'Latitude'))  : NaN;
      var lon = ub ? parseFloat(textoHijo(ub,'Longitude')) : NaN;
      if(isNaN(lat)||isNaN(lon)) continue;

      var refV   = textoHijo(mvj,'VehicleRef');
      var jRef   = textoHijo(mvj,'VehicleJourneyRef');
      var linea  = textoHijo(mvj,'PublishedLineName') || textoHijo(mvj,'LineRef');
      if(!linea && jRef){ var mr=jRef.match(/^trp_([A-Za-z]?\d+)_/); if(mr) linea=mr[1]; }
      var mc    = nodoHijo(mvj,'MonitoredCall');
      out.push({
        id:            refV || (linea+'_'+i),
        refVehiculo:   refV,
        lat:lat, lon:lon,
        linea:         linea||'—',
        destino:       textoHijo(mvj,'DestinationName')||'',
        direccion:     textoHijo(mvj,'DirectionName')||textoHijo(mvj,'DirectionRef')||'',
        bearing:       textoHijo(mvj,'Bearing') ? parseFloat(textoHijo(mvj,'Bearing')) : null,
        retrasoSeg:    parsearDuracion(textoHijo(mvj,'Delay')),
        registrado:    textoHijo(act,'RecordedAtTime'),
        paradaId:      mc ? textoHijo(mc,'StopPointRef') : null,
        estadoLlegada: mc ? textoHijo(mc,'ArrivalStatus') : null
      });
    }
    return out;
  }

  // ------------------------------------------------------------------
  // PINTADO
  // ------------------------------------------------------------------
  function iconoBus(linea, bearing){
    var rot = typeof bearing==='number' ? bearing : 0;
    var num = (linea||'').replace(/^A/,'');
    return L.divIcon({
      className:'',
      html:
        '<div style="position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;">' +
          '<svg width="34" height="34" viewBox="0 0 34 34" style="transform:rotate('+rot+'deg);position:absolute;top:0;left:0;">' +
            '<circle cx="17" cy="17" r="15" fill="#E84E1B" stroke="#1C1B1A" stroke-width="2"/>' +
            '<polygon points="17,4 22,12 12,12" fill="#1C1B1A"/>' +
          '</svg>' +
          '<span style="position:relative;z-index:1;font-size:9px;font-weight:800;color:#F6F2EA;pointer-events:none;line-height:1;">'+num+'</span>'+
        '</div>',
      iconSize:[34,34],
      iconAnchor:[17,17],
      popupAnchor:[0,-17]
    });
  }

  function pintarDesdeCache(){
    var filtro = document.getElementById('filtroLinea').value.trim().toUpperCase();
    capaBuses.clearLayers();

    var visibles = cacheVehiculos.filter(function(v){
      return !filtro || (v.linea||'').toUpperCase().indexOf(filtro)>=0;
    });

    visibles.forEach(function(v){
      var marker = L.marker([v.lat, v.lon], {icon: iconoBus(v.linea, v.bearing)});
      marker.bindPopup(construirPopup(v));
      marker.on('click', function(e){
        e.originalEvent._marcadorClick = true;
        mostrarRuta(v.linea);
        document.getElementById('filtroLinea').value = v.linea;
        actualizarPanelItinerario();
      });
      marker.addTo(capaBuses);
    });

    document.getElementById('contadorBuses').textContent =
      visibles.length + (filtro ? ' / '+cacheVehiculos.length : '') + ' autobuses';
  }

  function construirPopup(v){
    var rHtml = '';
    if(typeof v.retrasoSeg==='number'){
      var min = Math.round(v.retrasoSeg/60);
      if(min>0)       rHtml='<p class="popup-meta popup-retraso-tarde">Retraso: '+min+' min</p>';
      else if(min<0)  rHtml='<p class="popup-meta popup-retraso-pronto">Adelanto: '+Math.abs(min)+' min</p>';
      else            rHtml='<p class="popup-meta">En hora</p>';
    }
    var hReg = '';
    if(v.registrado){ var d=new Date(v.registrado); if(!isNaN(d)) hReg='<p class="popup-meta">Posición: '+d.toLocaleTimeString('es-ES')+'</p>'; }
    var pHtml = '';
    if(v.paradaId){
      var est={arrived:'en la parada',onTime:'a tiempo',delayed:'con retraso',early:'adelantado',cancelled:'cancelada'};
      pHtml='<p class="popup-meta">Parada: '+esc(v.paradaId)+(v.estadoLlegada?' ('+esc(est[v.estadoLlegada]||v.estadoLlegada)+')':'')+' </p>';
    }
    return '<span class="popup-linea">'+esc(v.linea)+'</span>'+
      (v.destino?'<p class="popup-dest">→ '+esc(v.destino)+'</p>':'')+
      (v.direccion?'<p class="popup-meta">Dir: '+esc(v.direccion)+'</p>':'')+
      rHtml+pHtml+hReg+
      '<p class="popup-meta">Vehículo: '+esc(v.refVehiculo||v.id)+'</p>';
  }

  function esc(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  init();
})();
</script>
</body>
</html>
